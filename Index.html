<script src="https://cdn.jsdelivr.net/npm/d3@7.9.0/dist/d3.min.js"></script><script src="https://cdn.jsdelivr.net/npm/markmap-view@0.18.12/dist/browser/index.js"></script><script src="https://cdn.jsdelivr.net/npm/markmap-toolbar@0.18.12/dist/index.js"></script><script>(()=>{setTimeout(()=>{const{markmap:S,mm:Q}=window,$=new S.Toolbar;$.attach(Q);const I=$.render();I.setAttribute("style","position:absolute;bottom:20px;right:20px"),document.body.append(I)})})()</script><script>((l,U,M,R)=>{const N=l();window.mm=N.Markmap.create("svg#mindmap",(U||N.deriveOptions)(R),M),window.matchMedia("(prefers-color-scheme: dark)").matches&&document.documentElement.classList.add("markmap-dark")})(()=>window.markmap,null,{"content":"Ciberseguridad 2026","children":[{"content":"Enfoque de la asignatura","children":[{"content":"La asignatura Ciberseguridad aplicada tiene como objetivo que el estudiante no solo comprenda los conceptos te&#xf3;ricos fundamentales, sino que sea capaz de aplicarlos en contextos reales, analizar escenarios concretos y evaluar decisiones de seguridad desde una perspectiva t&#xe9;cnica y organizacional. La asignatura busca desarrollar criterios t&#xe9;cnicos para la toma de decisiones en contextos reales de ciberseguridad, considerando limitaciones operativas, organizacionales y normativas.","children":[],"payload":{"tag":"li","lines":"11,14"}}],"payload":{"tag":"h3","lines":"10,11"}},{"content":"Bloque 1 - Fundamentos","children":[{"content":"Unidad 1 &#x2013; Espacio cibern&#xe9;tico y conceptos fundamentales","children":[{"content":"Concepto de espacio cibern&#xe9;tico. Aproximaciones te&#xf3;ricas y conceptuales al espacio cibern&#xe9;tico como entorno de interacci&#xf3;n socio-t&#xe9;cnica. Dimensiones del espacio cibern&#xe9;tico: t&#xe9;cnica, l&#xf3;gica y organizacional. Tipos de entidades presentes en el espacio cibern&#xe9;tico. Entidades activas y pasivas. Conceptos de sujeto y objeto. Roles din&#xe1;micos de las entidades seg&#xfa;n el contexto de interacci&#xf3;n. Interacci&#xf3;n entre sujetos y objetos en el flujo, procesamiento y almacenamiento de la informaci&#xf3;n. Concepto de ciberseguridad. Concepto de Ciberdefensa. Definiciones y enfoques existentes. Taxonom&#xed;a y diversidad conceptual. Diferencias, alcances y relaciones entre seguridad de la informaci&#xf3;n, seguridad inform&#xe1;tica y ciberseguridad.<br>\n<strong>Caso pr&#xe1;ctico</strong>: Identificaci&#xf3;n de actores y flujos de informaci&#xf3;n en un escenario organizacional simulado, con an&#xe1;lisis de roles y vulnerabilidades potenciales.","children":[],"payload":{"tag":"li","lines":"16,18"}}],"payload":{"tag":"li","lines":"15,18"}},{"content":"Unidad 2 &#x2013; Datos, informaci&#xf3;n y propiedades de seguridad","children":[{"content":"Concepto de datos y de informaci&#xf3;n. Diferencias conceptuales entre datos e informaci&#xf3;n. Ciclo de vida de los datos y de la informaci&#xf3;n. Valor estrat&#xe9;gico de los datos y la informaci&#xf3;n en las organizaciones. Propiedades de seguridad de la informaci&#xf3;n: confidencialidad, integridad, disponibilidad, autenticidad, trazabilidad y no repudio. Clasificaci&#xf3;n y priorizaci&#xf3;n de las propiedades de seguridad seg&#xfa;n su criticidad, en funci&#xf3;n del contexto, el activo involucrado y el impacto organizacional.<br>\n<strong>Caso pr&#xe1;ctico</strong>: Clasificaci&#xf3;n de activos de informaci&#xf3;n y asignaci&#xf3;n de prioridades de seguridad en un caso de estudio empresarial.","children":[],"payload":{"tag":"li","lines":"19,21"}}],"payload":{"tag":"li","lines":"18,21"}},{"content":"Unidad 3 &#x2013; Amenazas, vulnerabilidades y riesgo","children":[{"content":"Concepto de amenaza, vulnerabilidad, impacto y riesgo. Aplicaci&#xf3;n de estos conceptos en el an&#xe1;lisis de escenarios de ciberseguridad. Introducci&#xf3;n a los enfoques operativos en ciberseguridad: enfoque defensivo (Blue Team), ofensivo controlado (Red Team) y colaborativo (Purple Team). Rol de cada enfoque en la identificaci&#xf3;n de amenazas, el descubrimiento de vulnerabilidades y la reducci&#xf3;n del riesgo. Uso de los resultados de actividades ofensivas controladas como insumo para la gesti&#xf3;n del riesgo y la mejora de las capacidades defensivas.<br>\n<strong>Caso sugerido</strong>: Simulaci&#xf3;n de identificaci&#xf3;n de amenazas y vulnerabilidades, con an&#xe1;lisis de riesgos y propuesta de medidas de mitigaci&#xf3;n.","children":[],"payload":{"tag":"li","lines":"22,27"}}],"payload":{"tag":"li","lines":"21,27"}}],"payload":{"tag":"h3","lines":"14,15"}},{"content":"Bloque 2 - Gestiones Estructurales","children":[{"content":"Unidad 4 &#x2013; Gesti&#xf3;n de activos","children":[{"content":"Concepto de activo y su rol en la organizaci&#xf3;n. Categor&#xed;as de activos. Identificaci&#xf3;n de activos (inventario). Clasificaci&#xf3;n de activos seg&#xfa;n criticidad, valor y sensibilidad. Asignaci&#xf3;n de responsables o propietarios del activo (asset owner). Gesti&#xf3;n del ciclo de vida del activo: alta, modificaciones y baja. Dependencias y relaciones entre activos. Actualizaci&#xf3;n continua del inventario.<br>\n<strong>Caso pr&#xe1;ctico</strong>: Inventario de activos en un escenario simulado, asignaci&#xf3;n de propietarios y clasificaci&#xf3;n por criticidad.","children":[],"payload":{"tag":"li","lines":"29,31"}}],"payload":{"tag":"li","lines":"28,31"}},{"content":"Unidad 5 &#x2013; Gesti&#xf3;n de riesgos","children":[{"content":"Concepto y objetivos de la gesti&#xf3;n de riesgos en ciberseguridad. Etapas del proceso de gesti&#xf3;n de riesgos. Relaci&#xf3;n entre gesti&#xf3;n de activos y gesti&#xf3;n de riesgos. An&#xe1;lisis de riesgos. Evaluaci&#xf3;n y priorizaci&#xf3;n del riesgo. Tratamiento del riesgo: mitigaci&#xf3;n, aceptaci&#xf3;n, transferencia y evitaci&#xf3;n. Aceptaci&#xf3;n del riesgo. Monitoreo y revisi&#xf3;n del riesgo. Comunicaci&#xf3;n del riesgo dentro de la organizaci&#xf3;n.<br>\n<strong>Caso pr&#xe1;ctico</strong>: Evaluaci&#xf3;n de riesgos en un caso organizacional simulado, priorizaci&#xf3;n de controles y propuesta de mitigaci&#xf3;n.","children":[],"payload":{"tag":"li","lines":"32,39"}}],"payload":{"tag":"li","lines":"31,39"}}],"payload":{"tag":"h3","lines":"27,28"}},{"content":"Bloque 3 - Gestiones Operativas","children":[{"content":"Unidad 6 - Gesti&#xf3;n de Identidades y Accesos (IAM)","children":[{"content":"Concepto de gesti&#xf3;n de identidades y accesos. Gesti&#xf3;n de identidades digitales. Control de accesos a sistemas, servicios y recursos. Autenticaci&#xf3;n y autorizaci&#xf3;n. Principio de m&#xed;nimo privilegio. Relaci&#xf3;n entre IAM, riesgo y protecci&#xf3;n de activos.<br>\n<strong>Caso pr&#xe1;ctico</strong>: Elaboraci&#xf3;n de una matriz de accesos por rol, definici&#xf3;n de permisos seg&#xfa;n criticidad y riesgos asociados.","children":[],"payload":{"tag":"li","lines":"41,43"}}],"payload":{"tag":"li","lines":"40,43"}},{"content":"Unidad 7 - Gesti&#xf3;n de vulnerabilidades y segmentaci&#xf3;n de redes","children":[{"content":"Conceptos de vulnerabilidad en ciberseguridad, incluyendo vulnerabilidades explotables y no explotables. M&#xe9;todos de identificaci&#xf3;n de vulnerabilidades mediante escaneos autom&#xe1;ticos, revisiones t&#xe9;cnicas, reportes internos y ejercicios ofensivos controlados. Relaci&#xf3;n entre pruebas ofensivas, descubrimiento de vulnerabilidades y gesti&#xf3;n del riesgo, con evaluaci&#xf3;n, priorizaci&#xf3;n y tratamiento seg&#xfa;n impacto y probabilidad. Integraci&#xf3;n de los resultados del an&#xe1;lisis de vulnerabilidades en la toma de decisiones de seguridad, orientando la implementaci&#xf3;n de controles t&#xe9;cnicos.<br>\nSegmentaci&#xf3;n de redes y control de per&#xed;metro para reducir la superficie de ataque mediante aislamiento de entornos, definici&#xf3;n de zonas de seguridad y aplicaci&#xf3;n del principio de m&#xed;nimo privilegio en entornos de red.<br>\n<strong>Caso pr&#xe1;ctico</strong>: An&#xe1;lisis de vulnerabilidades de un sistema simulado y dise&#xf1;o de arquitectura de red segmentada alineada con riesgos identificados.","children":[],"payload":{"tag":"li","lines":"44,47"}}],"payload":{"tag":"li","lines":"43,47"}},{"content":"Unidad 8 - Gesti&#xf3;n de incidentes de seguridad","children":[{"content":"Concepto de incidente de seguridad de la informaci&#xf3;n. Detecci&#xf3;n y reporte de incidentes. Clasificaci&#xf3;n y priorizaci&#xf3;n de incidentes. Ciclo de vida de incidentes. Respuesta, contenci&#xf3;n y erradicaci&#xf3;n. Relaci&#xf3;n entre eventos de seguridad, alertas y detecci&#xf3;n temprana. Rol de los equipos defensivos (Blue Team) en la respuesta a incidentes. Uso de informaci&#xf3;n proveniente de ejercicios ofensivos y simulaciones para la preparaci&#xf3;n y mejora de la respuesta a incidentes. Coordinaci&#xf3;n entre capacidades defensivas y ejercicios de simulaci&#xf3;n (Purple Team) para fortalecer la detecci&#xf3;n, respuesta y recuperaci&#xf3;n. Recuperaci&#xf3;n de servicios afectados. Lecciones aprendidas y mejora continua del proceso de gesti&#xf3;n de incidentes.<br>\nCriptograf&#xed;a aplicada y forense digital en la gesti&#xf3;n de incidentes: t&#xe9;cnicas de hashing y firmas digitales para garantizar la integridad y autenticidad de registros y evidencia digital, cifrado de datos sensibles relacionados con incidentes y procedimientos de an&#xe1;lisis forense para la reconstrucci&#xf3;n de eventos, preservaci&#xf3;n de evidencia y soporte a la toma de decisiones.<br>\n<strong>Caso pr&#xe1;ctico</strong>: Resoluci&#xf3;n de un incidente simulado integrando trazabilidad de logs, protecci&#xf3;n de informaci&#xf3;n y an&#xe1;lisis forense.","children":[],"payload":{"tag":"li","lines":"48,54"}}],"payload":{"tag":"li","lines":"47,54"}}],"payload":{"tag":"h3","lines":"39,40"}},{"content":"Bloque 4 - Herramientas","children":[{"content":"Unidad 9 &#x2013; Herramientas open source en ciberseguridad","children":[{"content":"Introducci&#xf3;n a las herramientas open source en ciberseguridad y su rol en la pr&#xe1;ctica profesional. Alcances y limitaciones del uso de herramientas abiertas. Kali Linux: finalidad, objetivos y contexto de uso. Qu&#xe9; es y qu&#xe9; no es Kali Linux. Uso responsable de herramientas de seguridad. Marco &#xe9;tico y legal para el empleo de herramientas de ciberseguridad.<br>\n<strong>Caso pr&#xe1;ctico</strong>: Ejercicios guiados de Kali Linux a nivel conceptual y demostrativo, incluyendo escaneo de vulnerabilidades y pruebas controladas.","children":[],"payload":{"tag":"li","lines":"56,58"}}],"payload":{"tag":"li","lines":"55,58"}},{"content":"Unidad 10 &#x2013; Herramientas de monitoreo, detecci&#xf3;n y an&#xe1;lisis de eventos de seguridad","children":[{"content":"Concepto de monitoreo de seguridad. Diferencias entre prevenci&#xf3;n, detecci&#xf3;n y respuesta. Recolecci&#xf3;n y centralizaci&#xf3;n de eventos de seguridad. An&#xe1;lisis de logs y eventos. Introducci&#xf3;n a los sistemas de gesti&#xf3;n de informaci&#xf3;n y eventos de seguridad (SIEM). Centro de Operaciones de Seguridad (Security Operations Center &#x2013; SOC): funciones, componentes, roles y responsabilidades. Relaci&#xf3;n entre SIEM, herramientas de detecci&#xf3;n y gesti&#xf3;n de incidentes. Diferencias conceptuales entre SIEM, SOC y procesos de gesti&#xf3;n de incidentes. Correlaci&#xf3;n de eventos y generaci&#xf3;n de alertas. Herramientas de detecci&#xf3;n en red (IDS/IPS) y en endpoints (EDR). Uso de la informaci&#xf3;n de seguridad para la detecci&#xf3;n de incidentes, el seguimiento del estado de la seguridad y la toma de decisiones. Alcances y limitaciones de las herramientas de monitoreo. An&#xe1;lisis conceptual de escenarios y eventos de seguridad simulados.<br>\n<strong>Caso pr&#xe1;ctico</strong>: Simulaci&#xf3;n de un SOC con an&#xe1;lisis de eventos y generaci&#xf3;n de alertas, integrando informaci&#xf3;n de vulnerabilidades e incidentes.","children":[],"payload":{"tag":"li","lines":"59,64"}}],"payload":{"tag":"li","lines":"58,64"}}],"payload":{"tag":"h3","lines":"54,55"}},{"content":"Bloque 5 - Gobierno, normativa y continuidad","children":[{"content":"Unidad 11 &#x2013; Gesti&#xf3;n y gobierno de la ciberseguridad","children":[{"content":"Concepto de gobierno de la ciberseguridad. Estado de la ciberseguridad en la organizaci&#xf3;n. Modelos de madurez y diagn&#xf3;stico del nivel de ciberseguridad. Gesti&#xf3;n de la informaci&#xf3;n de seguridad (Security Information Management &#x2013; SIM). Definici&#xf3;n de estrategias de ciberseguridad alineadas con los objetivos organizacionales.<br>\n<strong>Caso pr&#xe1;ctico</strong>: Diagn&#xf3;stico de nivel de ciberseguridad de una organizaci&#xf3;n simulada y propuesta de plan estrat&#xe9;gico.","children":[],"payload":{"tag":"li","lines":"66,68"}}],"payload":{"tag":"li","lines":"65,68"}},{"content":"Unidad 12 &#x2013; Gesti&#xf3;n de pol&#xed;ticas y normativa","children":[{"content":"Concepto y rol de las pol&#xed;ticas y normas de seguridad de la informaci&#xf3;n en la organizaci&#xf3;n. Elaboraci&#xf3;n, implementaci&#xf3;n y mantenimiento de pol&#xed;ticas de seguridad. Auditor&#xed;a de seguridad de la informaci&#xf3;n. Introducci&#xf3;n a los est&#xe1;ndares internacionales ISO/IEC 27001 e ISO/IEC 27002. Relaci&#xf3;n entre normativa, gesti&#xf3;n de riesgos y gobierno de la ciberseguridad.<br>\n<strong>Caso pr&#xe1;ctico</strong>: Elaboraci&#xf3;n de un esquema de pol&#xed;ticas de seguridad para un escenario organizacional simulado, alineando controles con est&#xe1;ndares ISO.","children":[],"payload":{"tag":"li","lines":"69,71"}}],"payload":{"tag":"li","lines":"68,71"}},{"content":"Unidad 13 &#x2013; Gesti&#xf3;n de Continuidad (BCP/DRP) y planificaci&#xf3;n","children":[{"content":"Concepto de continuidad del negocio y resiliencia organizacional. Plan de Continuidad del Negocio (Business Continuity Plan &#x2013; BCP). Relaci&#xf3;n entre continuidad, gesti&#xf3;n de riesgos e incidentes de seguridad. Plan de Recuperaci&#xf3;n ante Desastres (Disaster Recovery Plan &#x2013; DRP). Plan de Ciberseguridad como instrumento de planificaci&#xf3;n estrat&#xe9;gica y operativa. Integraci&#xf3;n de los planes de continuidad dentro del gobierno de la ciberseguridad.<br>\n<strong>Caso pr&#xe1;ctico</strong>: Dise&#xf1;o de un plan de continuidad para un escenario de incidentes cibern&#xe9;ticos simulados, considerando recuperaci&#xf3;n de servicios cr&#xed;ticos.","children":[],"payload":{"tag":"li","lines":"72,78"}}],"payload":{"tag":"li","lines":"71,78"}}],"payload":{"tag":"h3","lines":"64,65"}},{"content":"Bloque 6 - Gesti&#xf3;n Organizacional","children":[{"content":"Unidad 14 - Gesti&#xf3;n de Concientizaci&#xf3;n y cultura organizacional","children":[{"content":"El factor humano en la ciberseguridad. Rol de la concientizaci&#xf3;n en seguridad de la informaci&#xf3;n y ciberseguridad. Cultura organizacional y comportamientos seguros. Roles y responsabilidades en materia de seguridad. Dise&#xf1;o e implementaci&#xf3;n de programas de concientizaci&#xf3;n y capacitaci&#xf3;n. Identificaci&#xf3;n de riesgos asociados al factor humano. Evaluaci&#xf3;n de la efectividad de las acciones de concientizaci&#xf3;n.<br>\n<strong>Caso pr&#xe1;ctico</strong>: Desarrollo de un programa de concientizaci&#xf3;n con evaluaci&#xf3;n de resultados y simulaci&#xf3;n de incidentes humanos.","children":[],"payload":{"tag":"li","lines":"80,82"}}],"payload":{"tag":"li","lines":"79,82"}},{"content":"Unidad 15 - Gesti&#xf3;n de Proveedores y terceros","children":[{"content":"Riesgos de ciberseguridad asociados a proveedores y terceros. Identificaci&#xf3;n y clasificaci&#xf3;n de proveedores cr&#xed;ticos. Dependencias externas y riesgos en la cadena de suministro. Definici&#xf3;n de requisitos de seguridad para terceros. Acuerdos, contratos y responsabilidades en materia de seguridad de la informaci&#xf3;n. Evaluaci&#xf3;n y seguimiento del riesgo asociado a terceros. Gesti&#xf3;n de incidentes de seguridad originados en proveedores.<br>\n<strong>Caso pr&#xe1;ctico</strong>: Evaluaci&#xf3;n de seguridad de un proveedor simulado y dise&#xf1;o de controles contractuales.","children":[],"payload":{"tag":"li","lines":"83,85"}}],"payload":{"tag":"li","lines":"82,85"}},{"content":"Unidad 16 - Gesti&#xf3;n de M&#xe9;tricas e indicadores de seguridad","children":[{"content":"Importancia de la medici&#xf3;n en la gesti&#xf3;n de la ciberseguridad. Concepto y tipos de m&#xe9;tricas e indicadores de seguridad. M&#xe9;tricas t&#xe9;cnicas y m&#xe9;tricas organizacionales. Indicadores clave de riesgo (Key Risk Indicators &#x2013; KRI). Indicadores clave de desempe&#xf1;o (Key Performance Indicators &#x2013; KPI). Uso de m&#xe9;tricas e indicadores para la toma de decisiones. Seguimiento y evaluaci&#xf3;n del estado de la seguridad de la informaci&#xf3;n.<br>\n<strong>Caso pr&#xe1;ctico</strong>: Elaboraci&#xf3;n de dashboard de m&#xe9;tricas e indicadores de seguridad para un caso pr&#xe1;ctico de organizaci&#xf3;n simulada.","children":[],"payload":{"tag":"li","lines":"86,91"}}],"payload":{"tag":"li","lines":"85,91"}}],"payload":{"tag":"h3","lines":"78,79"}},{"content":"Bloque 7","children":[{"content":"Unidad 17 &#x2013; Unidad integradora - An&#xe1;lisis integral de la ciberseguridad","children":[{"content":"Articulaci&#xf3;n de las gestiones estructurales y operativas de la ciberseguridad en un enfoque integral. An&#xe1;lisis transversal de las decisiones de seguridad en funci&#xf3;n del riesgo. Identificaci&#xf3;n de dependencias entre activos, riesgos y controles de seguridad. Priorizaci&#xf3;n de medidas t&#xe9;cnicas, organizacionales y normativas. Evaluaci&#xf3;n del impacto de las decisiones de seguridad sobre la continuidad operativa.<br>\n<strong>Caso pr&#xe1;ctico</strong>: An&#xe1;lisis integral de un caso aplicado de ciberseguridad, integrando vulnerabilidades, incidentes, controles, m&#xe9;tricas y continuidad.","children":[],"payload":{"tag":"li","lines":"93,97"}}],"payload":{"tag":"li","lines":"92,97"}}],"payload":{"tag":"h3","lines":"91,92"}},{"content":"Bibliograf&#xed;a","children":[{"content":"Corletti, J. (2020). Ciberseguridad y Gesti&#xf3;n de Riesgos: Una Aproximaci&#xf3;n Aplicada. Buenos Aires, Argentina: Editorial Tecnol&#xf3;gica. Incluye casos pr&#xe1;cticos y an&#xe1;lisis de riesgos.","children":[],"payload":{"tag":"li","lines":"98,99"}},{"content":"de Vergara, E. (2021). Operaciones Cibern&#xe9;ticas en el Ciberespacio: Conceptos, Estrategias y Aplicaciones. Buenos Aires, Argentina: Editorial Defensa Nacional. Enfoque en doctrina y ciberdefensa nacional.","children":[],"payload":{"tag":"li","lines":"99,100"}},{"content":"International Organization for Standardization. (2013). ISO/IEC 27001: Information Security, Information Security Management Systems Requirements. Recuperado de https://www.iso.org/standard/54534.html","children":[],"payload":{"tag":"li","lines":"100,101"}},{"content":"International Organization for Standardization. (2013). ISO/IEC 27002: Code of Practice for Information Security Controls.","children":[],"payload":{"tag":"li","lines":"101,103"}}],"payload":{"tag":"h3","lines":"97,98"}}],"payload":{"tag":"h2","lines":"7,8"}},{"colorFreezeLevel":7,"maxWidth":400})</script>
